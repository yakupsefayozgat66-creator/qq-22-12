<!DOCTYPE html>
<html lang="tr">
<head>

    <title>Karanlık Oda - Korku Oyunu</title>

            display: flex;

            align-items: center;
            height: 100vh;

            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            cursor: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
    </style>
</head>
