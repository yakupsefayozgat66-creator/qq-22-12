<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoş Geldiniz</title>
    <style>
        body {
            font-family: sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .btn {
            background-color: #fff;
            color: #764ba2;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            display: block;
            margin: 15px auto;
            width: fit-content;
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.95); }
        h1 { font-size: 1.5rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bize Instagram'dan Ulaşın</h1>
        <a href="https://www.instagram.com/jakobss66" target="_blank" class="btn">@jakobss66</a>
        <a href="https://www.instagram.com/paranormal_offical1" target="_blank" class="btn">@paranormal_offical1</a>
    </div>
</body>
</html>
