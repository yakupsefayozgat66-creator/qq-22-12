<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPM Sefa Bot</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f0f0f; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        #bot-container { 
            background: #1a1a1a; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); 
            width: 90%;
            max-width: 380px; 
            text-align: center; 
            border: 1px solid #333; 
        }
        .btn { 
            background: #2980b9; 
            border: none; 
            color: white; 
            padding: 14px; 
            margin: 10px 0; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            transition: 0.3s; 
            font-size: 16px; 
            display: block;
            text-decoration: none;
        }
        .btn:hover { 
            background: #3498db; 
            transform: scale(1.02); 
        }
        .btn-insta { 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
        }
        .btn-download {
            background: #27ae60;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .btn-back {
            background: #444;
            margin-top: 15px;
        }
        .price-list { 
            text-align: left; 
            background: #252525; 
            padding: 15px; 
            border-radius: 10px; 
            margin: 15px 0; 
            border-left: 4px solid #f1c40f; 
        }
        .price-item { 
            margin: 8px 0; 
            font-size: 0.95em; 
            display: flex; 
            justify-content: space-between; 
        }
        .warning { 
            color: #ff4757; 
            font-size: 0.85em; 
            font-weight: bold; 
            margin-top: 10px; 
        }
        .info-box {
            background: #252525; 
            padding: 15px; 
            border-radius: 10px; 
            border-left: 4px solid #3498db;
            margin: 15px 0;
            text-align: left;
            font-size: 0.95em;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="bot-container">
    <div id="step1">
        <h2 style="color: #3498db;">CPM SEFA</h2>
        <div style="background: #222; padding: 10px; border-radius: 10px; margin-bottom: 15px;">
            <p style="font-size: 0.9em; margin-bottom: 10px;">CPM yoksa hemen indir 👇</p>
            <a href="https://play.google.com/store/apps/details?id=com.olzhas.carparking.multyplayer" target="_blank" class="btn btn-download">OYUNU İNDİR</a>
        </div>
        <p>Lütfen @jakobss66 takip edin.</p>
        <a href="https://instagram.com/jakobss66" target="_blank" class="btn btn-insta">@jakobss66 Takip Et</a>
        <button class="btn" onclick="showStep2()">BAŞLAT</button>
    </div>

    <div id="step2" class="hidden">
        <h3 style="color: #3498db;">Ana Menü</h3>
        <button class="btn" onclick="selectOption(1)">1 - Bedava Hesap İstiyorum</button>
        <button class="btn" onclick="selectOption(2)">2 - Paralı Hesap İstiyorum</button>
        <p class="warning">⚠️ Bedava hesaplar randomdur!</p>
    </div>

    <div id="step3_free" class="hidden">
        <h3>🎁 Bedava Hesap</h3>
        <div class="info-box">DM üzerinden size hesap vereceğim.</div>
        <a href="https://instagram.com/jakobss66" target="_blank" class="btn btn-insta">DM GÖNDER</a>
        <button class="btn btn-back" onclick="goBack()">Geri Dön</button>
    </div>

    <div id="step4_paid" class="hidden">
        <h3 style="color: #f1c40f;">💎 Fiyat Listesi</h3>
        <div class="price-list">
            <div class="price-item"><span>Mini:</span> <b>100 TL</b></div>
            <div class="price-item"><span>Efsane:</span> <b>200 TL</b></div>
            <div class="price-item"><span>Ultra:</span> <b>300 TL</b></div>
        </div>
        <a href="https://instagram.com/jakobss66" target="_blank" class="btn btn-insta">SATIN AL (DM)</a>
        <button class="btn btn-back" onclick="goBack()">Geri Dön</button>
    </div>
</div>

<script>
    function showStep2() {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
    }
    function selectOption(choice) {
        document.getElementById('step2').classList.add('hidden');
        if(choice === 1) document.getElementById('step3_free').classList.remove('hidden');
        else document.getElementById('step4_paid').classList.remove('hidden');
    }
    function goBack() {
        document.getElementById('step3_free').classList.add('hidden');
        document.getElementById('step4_paid').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
    }
</script>

</body>
  </html>
